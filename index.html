<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover, maximum-scale=1.5">
    <title>强韧生活 · 一体化管理</title>
    <meta name="theme-color" content="#2DD4BF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="强韧生活">
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* 所有 CSS 保持完全不变 */
        :root {
            --bg-body: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            --bg-container: rgba(12, 20, 35, 0.65);
            --border-glow: rgba(0, 255, 255, 0.2);
            --text: #fff;
            --text-secondary: #2DD4BF;
            --card-bg: rgba(0, 0, 0, 0.45);
            --table-bg: rgba(0, 0, 0, 0.3);
            --th-bg: #0f172ad9;
            --td-bg: rgba(10, 20, 35, 0.7);
            --btn-bg: rgba(20, 30, 45, 0.85);
            --btn-border: #2DD4BF;
            --highlight-bg: #2DD4BF;
            --banner-bg: linear-gradient(135deg, #2DD4BF, #0f766e);
            --nav-bg: rgba(0, 0, 0, 0.6);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --radius: 28px;
            --success: #10b981;
            --danger: #ef4444;
            --income: #4ade80;
            --expense: #f87171;
            --lend: #a78bfa;
            --borrow: #fbbf24;
            --deposit: #38bdf8;
            --input-bg: rgba(20, 30, 50, 0.7);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            margin:0; padding:10px 10px 80px; min-height:100vh;
            font-family:'Inter',system-ui,sans-serif;
            background: var(--bg-body); color: var(--text);
            transition: background .3s, color .3s;
            background-size:cover; background-position:center; background-attachment:fixed;
        }
        body.theme-aurora {
            --bg-body: linear-gradient(145deg, #0b2f3c, #021017);
            --bg-container: rgba(0,30,40,0.65); --border-glow: #4ade80; --text: #e0f2fe;
            --text-secondary: #4ade80; --card-bg: rgba(0,30,40,0.8); --table-bg: rgba(0,20,30,0.5);
            --th-bg: #0a2e3a; --td-bg: #07212e; --btn-bg: #0a3a44; --btn-border: #4ade80;
            --highlight-bg: #4ade80; --banner-bg: linear-gradient(135deg,#4ade80,#16a34a);
            --nav-bg: rgba(2,16,23,0.8); --input-bg: rgba(10,40,50,0.7);
        }
        body.theme-sunset {
            --bg-body: linear-gradient(145deg, #1a0a00, #3d1c00);
            --bg-container: rgba(60,25,0,0.65); --border-glow: #ffb347; --text: #fff5ec;
            --text-secondary: #ffb347; --card-bg: rgba(40,20,0,0.7); --table-bg: rgba(30,12,0,0.5);
            --th-bg: #5c2a00; --td-bg: #3d1c00; --btn-bg: #5c2a00; --btn-border: #ffb347;
            --highlight-bg: #ffb347; --banner-bg: linear-gradient(135deg,#ffb347,#f97316);
            --nav-bg: rgba(20,8,0,0.8); --input-bg: rgba(60,25,0,0.7);
        }
        body.theme-light-gray {
            --bg-body: #f0f2f5; --bg-container: rgba(255,255,255,0.85); --border-glow: #c0c4cc;
            --text: #2c3e50; --text-secondary: #5a6d80; --card-bg: #fff; --table-bg: #f8f9fa;
            --th-bg: #e9ecef; --td-bg: #fff; --btn-bg: #e9ecef; --btn-border: #c0c4cc;
            --highlight-bg: #5a6d80; --banner-bg: linear-gradient(135deg,#5a6d80,#34495e);
            --nav-bg: rgba(255,255,255,0.9); --input-bg: #f8f9fa;
        }
        body.theme-sakura {
            --bg-body: linear-gradient(145deg, #fce4ec, #f8bbd0);
            --bg-container: rgba(255,240,245,0.85); --border-glow: #f06292; --text: #4a1525;
            --text-secondary: #c2185b; --card-bg: #fff0f5; --table-bg: rgba(255,235,240,0.7);
            --th-bg: #f8bbd0; --td-bg: #fff0f5; --btn-bg: #f8bbd0; --btn-border: #f06292;
            --highlight-bg: #f06292; --banner-bg: linear-gradient(135deg,#f48fb1,#ec407a);
            --nav-bg: rgba(255,240,245,0.9); --input-bg: #fff0f5;
        }
        body.theme-ink {
            --bg-body: #121212; --bg-container: rgba(30,30,30,0.85); --border-glow: #5a5a5a;
            --text: #e0e0e0; --text-secondary: #b0b0b0; --card-bg: #1e1e1e;
            --table-bg: rgba(40,40,40,0.5); --th-bg: #2c2c2c; --td-bg: #1e1e1e;
            --btn-bg: #2c2c2c; --btn-border: #5a5a5a; --highlight-bg: #5a5a5a;
            --banner-bg: linear-gradient(135deg,#5a5a5a,#3a3a3a); --nav-bg: rgba(18,18,18,0.9);
            --input-bg: #2c2c2c;
        }
        body.theme-mint {
            --bg-body: linear-gradient(145deg, #e0f7fa, #b2dfdb);
            --bg-container: rgba(240,255,250,0.85); --border-glow: #4db6ac; --text: #1e3a3a;
            --text-secondary: #00796b; --card-bg: #fff; --table-bg: rgba(245,255,250,0.7);
            --th-bg: #b2dfdb; --td-bg: #f0fdfa; --btn-bg: #b2dfdb; --btn-border: #4db6ac;
            --highlight-bg: #4db6ac; --banner-bg: linear-gradient(135deg,#4db6ac,#26a69a);
            --nav-bg: rgba(240,255,250,0.9); --input-bg: #f0fdfa;
        }
        body.theme-ocean {
            --bg-body: linear-gradient(145deg, #003366, #001a33);
            --bg-container: rgba(0,30,60,0.75); --border-glow: #66b2ff; --text: #e6f2ff;
            --text-secondary: #66b2ff; --card-bg: rgba(0,20,40,0.8); --table-bg: rgba(0,10,20,0.5);
            --th-bg: #00264d; --td-bg: #001a33; --btn-bg: #003366; --btn-border: #66b2ff;
            --highlight-bg: #66b2ff; --banner-bg: linear-gradient(135deg,#66b2ff,#003366);
            --nav-bg: rgba(0,10,20,0.8); --input-bg: rgba(0,30,60,0.7);
        }
        .container { max-width:1200px; margin:0 auto; padding:0.5rem; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem; flex-wrap:wrap; gap:10px; }
        .header h1 { font-size:2rem; font-weight:700; background: linear-gradient(135deg, var(--text-secondary), var(--text)); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .theme-selector { display:flex; gap:8px; flex-wrap:wrap; }
        .theme-btn { width:38px; height:38px; border-radius:50%; border:2px solid var(--border-glow); background: var(--btn-bg); color: var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; transition:all .2s; box-shadow:var(--shadow); }
        .theme-btn.active { border-color:var(--text-secondary); box-shadow:0 0 14px var(--text-secondary); transform:scale(1.1); }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:72px; background:var(--nav-bg); backdrop-filter:blur(20px); display:flex; justify-content:space-around; align-items:center; border-top:1px solid var(--border-glow); z-index:100; padding-bottom:env(safe-area-inset-bottom,0); }
        .bottom-nav button { flex:1; background:transparent; border:none; color:var(--text); display:flex; flex-direction:column; align-items:center; gap:4px; font-size:0.7rem; padding:8px 4px; opacity:0.6; transition:.2s; cursor:pointer; position:relative; }
        .bottom-nav button i { font-size:1.3rem; transition:.3s; background:linear-gradient(135deg, var(--text), var(--text-secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; opacity:0.7; }
        .bottom-nav button.active { opacity:1; font-weight:bold; }
        .bottom-nav button.active i { opacity:1; animation:navIconPop .4s ease; text-shadow:0 0 12px var(--text-secondary); }
        @keyframes navIconPop { 0%{transform:scale(0.8);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
        .sync-indicator { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--card-bg); backdrop-filter:blur(12px); border-radius:20px; padding:6px 16px; font-size:0.7rem; color:var(--text-secondary); border:1px solid var(--border-glow); z-index:99; display:flex; align-items:center; gap:6px; opacity:0; transition:opacity .3s; pointer-events:none; }
        .sync-indicator.show { opacity:1; }
        .sync-indicator i { animation:spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0);} to{transform:rotate(360deg);} }
        .sync-indicator.done { color:var(--success); border-color:var(--success); }
        .sync-indicator.done i { animation:none; }
        .page { display:none; animation:fadeIn .3s; }
        .page.active { display:block; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .card { background:var(--card-bg); backdrop-filter:blur(14px); border-radius:var(--radius); padding:22px; border:1px solid var(--border-glow); box-shadow:var(--shadow); margin-bottom:18px; }
        .current-task-banner { background:var(--banner-bg); border-radius:24px; padding:16px 20px; margin-bottom:8px; text-align:center; font-weight:bold; color:#fff; box-shadow:0 6px 20px var(--border-glow); font-size:1.1rem; cursor:pointer; transition:.2s; }
        .current-subtasks-mini { background:var(--card-bg); border-radius:16px; padding:10px 16px; margin-bottom:14px; border:1px dashed var(--border-glow); font-size:0.8rem; color:var(--text); min-height:20px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
        .mini-sub { display:inline-flex; align-items:center; gap:4px; background:var(--btn-bg); border-radius:12px; padding:4px 10px; font-size:0.72rem; }
        .mini-sub.done { opacity:0.5; text-decoration:line-through; }
        table { width:100%; border-collapse:separate; border-spacing:0; font-size:0.8rem; background:var(--table-bg); border-radius:18px; overflow:hidden; }
        th,td { border:0.5px solid var(--border-glow); padding:10px 6px; text-align:center; background:var(--td-bg); color:var(--text); }
        th { background:var(--th-bg); color:var(--text-secondary); font-weight:600; font-size:0.7rem; }
        th:first-child,td:first-child { position:sticky; left:0; z-index:5; background:var(--th-bg); color:var(--text-secondary); font-weight:bold; }
        td:first-child { background:var(--td-bg); font-family:monospace; }
        .cell-content { display:flex; justify-content:center; align-items:center; gap:4px; min-height:22px; cursor:pointer; flex-wrap:wrap; }
        .subtask-count { font-size:0.6rem; background:var(--btn-bg); border-radius:10px; padding:0 4px; margin-left:4px; opacity:0.8; }
        td.selected-cell { outline:2px solid var(--text-secondary); outline-offset:-2px; z-index:5; }
        td.now-highlight { background:var(--highlight-bg)!important; color:#fff!important; font-weight:bold; box-shadow:0 0 15px var(--text-secondary); border-radius:8px; transform:scale(1.02); z-index:4; animation:glowPulse 2s infinite; }
        @keyframes glowPulse { 0%{box-shadow:0 0 8px var(--text-secondary);} 50%{box-shadow:0 0 22px var(--text-secondary);} 100%{box-shadow:0 0 8px var(--text-secondary);} }
        .sub-tabs { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .sub-tab { padding:10px 18px; border-radius:24px; background:var(--btn-bg); color:var(--text); border:1px solid var(--border-glow); cursor:pointer; font-size:0.8rem; transition:.2s; box-shadow:var(--shadow); }
        .sub-tab.active { background:var(--highlight-bg); color:#fff; border-color:var(--highlight-bg); box-shadow:0 0 15px var(--highlight-bg); }
        .input-field { background:var(--input-bg); border:1px solid var(--border-glow); border-radius:16px; padding:14px 16px; color:var(--text); width:100%; margin:8px 0; outline:none; font-size:0.9rem; transition:.2s; font-family:inherit; resize:vertical; backdrop-filter:blur(8px); }
        .input-field:focus { border-color:var(--text-secondary); box-shadow:0 0 16px rgba(45,212,191,0.25); }
        textarea.input-field { min-height:120px; line-height:1.6; border-radius:18px; }
        .btn { background:var(--btn-bg); border:1px solid var(--btn-border); color:var(--text); padding:12px 18px; border-radius:24px; font-size:0.85rem; cursor:pointer; transition:.2s; box-shadow:var(--shadow); white-space:nowrap; }
        .btn:hover { box-shadow:0 0 14px var(--text-secondary); transform:translateY(-1px); }
        .btn:active { transform:scale(0.96); }
        .btn-primary { background:var(--highlight-bg); color:#fff; border:none; font-weight:bold; }
        .btn-danger { background:rgba(248,113,113,0.15); color:var(--text); border:1px solid #f87171; }
        .btn-sm { padding:8px 14px; font-size:0.75rem; border-radius:20px; }
        .btn-xs { padding:5px 10px; font-size:0.68rem; border-radius:14px; }
        .btn:disabled { opacity:0.45; cursor:not-allowed; box-shadow:none; transform:none; }
        .stat-box { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:12px; font-size:0.9rem; }
        .progress-bar { height:10px; background:rgba(0,0,0,0.2); border-radius:6px; overflow:hidden; margin:10px 0; }
        .progress { height:100%; background:var(--highlight-bg); width:60%; border-radius:6px; transition:width .4s; }
        .chart-placeholder { width:100%; height:160px; background:var(--card-bg); border-radius:18px; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); margin:12px 0; border:1px dashed var(--border-glow); font-size:1.2rem; position:relative; }
        .chart-placeholder canvas { max-width:100%; max-height:100%; }
        .diary-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; }
        .diary-card { background:var(--card-bg); border-radius:20px; padding:16px; border:1px solid var(--border-glow); cursor:pointer; transition:.2s; box-shadow:var(--shadow); overflow:hidden; }
        .diary-card:hover { box-shadow:0 8px 25px var(--border-glow); transform:translateY(-2px); }
        .diary-card .date { font-size:0.75rem; color:var(--text-secondary); }
        .diary-card .title { font-weight:600; margin:8px 0; font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .diary-card .preview { font-size:0.75rem; opacity:0.7; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; line-height:1.4; max-height:3.2em; }
        .setting-item { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border-glow); flex-wrap:wrap; gap:8px; }
        .setting-item:last-child { border-bottom:none; }
        .conn-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; }
        .conn-dot.online { background:var(--success); box-shadow:0 0 8px var(--success); }
        .conn-dot.offline { background:var(--danger); box-shadow:0 0 8px var(--danger); }
        .hidden { display:none!important; }
        .reminder-on { background:var(--success)!important; color:#fff!important; border-color:var(--success)!important; box-shadow:0 0 14px var(--success); animation:reminderGlow 2s infinite; }
        .reminder-off { background:var(--btn-bg)!important; color:var(--text)!important; border-color:var(--border-glow)!important; box-shadow:none; animation:none; }
        @keyframes reminderGlow { 0%,100%{box-shadow:0 0 8px var(--success);} 50%{box-shadow:0 0 20px var(--success);} }
        .modal { position:fixed; top:0; left:0; right:0; bottom:0; z-index:200; display:none; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); align-items:center; justify-content:center; overflow-y:auto; padding:20px; }
        .modal.show { display:flex; }
        .modal-card { width:94%; max-width:520px; background:var(--card-bg); backdrop-filter:blur(20px); border-radius:28px; padding:24px; border:1px solid var(--border-glow); box-shadow:0 20px 50px rgba(0,0,0,0.6); margin:auto; max-height:90vh; overflow-y:auto; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .modal-header h3 { margin:0; font-size:1.2rem; color:var(--text-secondary); }
        .info-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; font-size:0.85rem; flex-wrap:wrap; gap:6px; }
        .tag { display:inline-block; padding:6px 12px; border-radius:14px; font-size:0.72rem; background:var(--btn-bg); margin:2px 4px 2px 0; cursor:pointer; transition:.2s; border:1px solid transparent; }
        .tag.active { background:var(--highlight-bg); color:#fff; border-color:var(--highlight-bg); box-shadow:0 0 10px var(--highlight-bg); }
        .tag:hover { border-color:var(--text-secondary); }
        .search-box { position:relative; margin-bottom:14px; }
        .search-box input { padding-left:36px; }
        .search-box i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-secondary); }
        .debt-section { margin-bottom:20px; }
        .debt-section h4 { margin-bottom:8px; color:var(--text-secondary); }
        #subtaskList { display:flex; flex-direction:column; gap:8px; max-height:200px; overflow-y:auto; padding:4px 0; }
        .subtask-item { display:flex; align-items:center; gap:10px; background:var(--input-bg); border-radius:14px; padding:8px 12px; border:1px solid var(--border-glow); transition:.2s; }
        .subtask-item input[type="checkbox"] { width:18px; height:18px; accent-color:var(--highlight-bg); cursor:pointer; flex-shrink:0; }
        .subtask-item input[type="text"] { flex:1; background:transparent; border:none; color:var(--text); font-size:0.85rem; outline:none; padding:4px 0; font-family:inherit; }
        .subtask-item button { background:transparent; border:none; cursor:pointer; font-size:0.9rem; opacity:0.6; transition:.2s; color:var(--text); flex-shrink:0; }
        .subtask-item button:hover { opacity:1; color:#f87171; }
        .subtask-row { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:0.82rem; border-bottom:1px solid rgba(255,255,255,0.05); }
        .flex-between { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; }
        .budget-item { background:var(--input-bg); border-radius:14px; padding:12px 16px; margin-bottom:10px; border:1px solid var(--border-glow); }
        .pagination { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; justify-content:center; }
        .pagination button { padding:6px 12px; border-radius:14px; background:var(--btn-bg); border:1px solid var(--border-glow); color:var(--text); cursor:pointer; font-size:0.75rem; }
        .pagination button.active { background:var(--highlight-bg); color:#fff; }
        .sub-page { display:block; } .sub-page.hidden { display:none!important; }
        .plan-sub { display:block; } .plan-sub.hidden { display:none!important; }
        .type-btn-group { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0; }
        .type-opt { padding:8px 14px; border-radius:18px; font-size:0.75rem; cursor:pointer; border:1px solid var(--border-glow); background:var(--btn-bg); color:var(--text); transition:.2s; }
        .type-opt.active { background:var(--highlight-bg); color:#fff; border-color:var(--highlight-bg); }
        .type-opt[data-type="income"] { border-left:3px solid var(--income); }
        .type-opt[data-type="expense"] { border-left:3px solid var(--expense); }
        .type-opt[data-type="deposit"] { border-left:3px solid var(--deposit); }
        .type-opt[data-type="lend"] { border-left:3px solid var(--lend); }
        .type-opt[data-type="borrow"] { border-left:3px solid var(--borrow); }
        #imagePreviewContainer { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0; }
        #imagePreviewContainer>div { position:relative; width:80px; height:80px; border-radius:14px; overflow:hidden; border:1px solid var(--border-glow); }
        #imagePreviewContainer img { width:100%; height:100%; object-fit:cover; }
        .remove-image-btn { position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.7); color:#fff; border:none; border-radius:50%; width:22px; height:22px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
        .diary-card img { width:100%; border-radius:14px; margin-bottom:8px; max-height:130px; object-fit:cover; }
        .wallpaper-thumb { width:80px; height:80px; border-radius:12px; object-fit:cover; border:2px solid transparent; cursor:pointer; transition:.2s; }
        .wallpaper-thumb.selected { border-color:var(--highlight-bg); box-shadow:0 0 12px var(--highlight-bg); }
        .wallpaper-none { width:80px; height:80px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; background:var(--input-bg); border:2px dashed var(--border-glow); cursor:pointer; font-size:0.75rem; margin-right:8px; }
        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border-glow); border-radius:4px; }
        @media(max-width:600px) { .header h1 { font-size:1.4rem; } .card { padding:14px; } .modal-card { padding:16px; border-radius:22px; } .diary-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; } }
    </style>
</head>
<body>
    <div class="container" style="margin-bottom:0;">
        <div class="header">
            <h1>✨ 强韧生活</h1>

    <script>
        // ==================== 您的 Supabase 配置 ====================
        const SUPABASE_URL = 'https://ickvrfrhlynxnlmnrhcq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlja3ZyZnJobHlueG5sbW5yaGNxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzgxMTI4NSwiZXhwIjoyMDkzMzg3Mjg1fQ.TAAmjopUp2Atbfdwsf87PHna2c55ln4eWzUxpjfTRl4';
        const USER_ID = 'user_kaungmyat_fixed';
        const LS_PREFIX = 'qiangren_';
        const FINANCE_LS = 'cf_';
        let supabase, cloudReady = false, audioCtx = null, highlightInterval = null;
        function initSupabase() { try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); return true; } catch (e) { return false; } }
        async function testCloudConnection() { if (!supabase) return false; try { const { error } = await supabase.from('plan_data').select('id', { count: 'exact', head: true }).limit(1); return !error; } catch { return false; } }
        function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }
        function loadJSON(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
        function saveJSON(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) { console.warn('存储失败', key, e); } }
        function getWeekKey(d) { let date = new Date(d); date.setHours(0,0,0,0); date.setDate(date.getDate()+3-(date.getDay()+6)%7); let y = date.getFullYear(); let w = Math.floor(((date-new Date(y,0,4))/86400000+(new Date(y,0,4).getDay()+6)%7)/7); return `${y}-W${w.toString().padStart(2,'0')}`; }
        function getWeekDates(wk) { let [year,w]=wk.split('-W'); let jan4=new Date(parseInt(year),0,4); let day=jan4.getDay(); let offset=day===0?-6:1-day; let mon=new Date(jan4); mon.setDate(jan4.getDate()+offset+(parseInt(w)-1)*7); let dates=[]; for(let i=0;i<7;i++){ let d=new Date(mon); d.setDate(mon.getDate()+i); dates.push(d.toISOString().slice(0,10)); } return dates; }
        function showSyncIndicator(text,done=false){ const el=document.getElementById('syncIndicator'); if(!el)return; el.querySelector('span').textContent=text; el.classList.add('show'); if(done){ el.classList.add('done'); el.querySelector('i').className='fas fa-check-circle'; }else{ el.classList.remove('done'); el.querySelector('i').className='fas fa-sync-alt'; } clearTimeout(el._timeout); el._timeout=setTimeout(()=>el.classList.remove('show'),done?2000:10000); }

        // 壁纸修复
        let wallpapers = loadJSON('wallpapers', []);
        let currentWallpaperIndex = loadJSON('currentWallpaper', null);
        function applyWallpaper() {
            if (currentWallpaperIndex !== null && wallpapers[currentWallpaperIndex]) {
                const wp = wallpapers[currentWallpaperIndex].url;
                document.body.style.background = `linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.5)),url(${wp}) center/cover no-repeat`;
                document.body.style.backgroundAttachment = 'fixed';
            } else {
                document.body.style.background = '';
                document.body.style.backgroundAttachment = '';
            }
        }
        function saveWallpaperState() {
            saveJSON('wallpapers', wallpapers);
            saveJSON('currentWallpaper', currentWallpaperIndex);
            applyWallpaper();
        }
        function handleThemeChange(theme) {
            document.body.className = 'theme-' + theme;
            applyWallpaper();
            document.querySelectorAll('#themeSelector .theme-btn').forEach(b => b.classList.remove('active'));
            const tb = document.querySelector(`#themeSelector .theme-btn[data-theme="${theme}"]`);
            if (tb) tb.classList.add('active');
            const sg = document.getElementById('settingsThemeGroup');
            if (sg) {
                sg.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                const stb = sg.querySelector(`.theme-btn[data-theme="${theme}"]`);
                if (stb) stb.classList.add('active');
            }
        }

        async function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            document.querySelectorAll('#bottomNav button').forEach(b => b.classList.remove('active'));
            const navBtn = document.querySelector(`#bottomNav button[data-page="${page}"]`);
            if (navBtn) navBtn.classList.add('active');
            if (!cloudReady) cloudReady = await testCloudConnection();
            showSyncIndicator('同步中...');
            if (page === 'plan') await PlanModule.render();
            else if (page === 'diary') await DiaryModule.render();
            else if (page === 'finance') await FinanceModule.render();
            else if (page === 'settings') await SettingsModule.render();
            showSyncIndicator('已同步', true);
        }

        document.querySelectorAll('#bottomNav button').forEach(btn => btn.addEventListener('click', () => switchPage(btn.dataset.page)));
        document.querySelectorAll('#themeSelector .theme-btn').forEach(btn => btn.addEventListener('click', function(){
            handleThemeChange(this.dataset.theme);
            PlanModule.saveThemeSetting(this.dataset.theme);
        }));

        const PlanModule = (function() {
            let currentWeekKey, currentDates = [], timeSlots = [], tableData = [];
            let localCache = {}, mergedGroups = {};
            let mergeMode = false, mergeSelection = [];
            let reminderEnabled = false, reminderInterval = null;
            let currentSubtaskContext = null;
            let useHalfHour = true;
            let lastRemindedSlot = null;

            function genTimeSlots() {
                let slots = [];
                if (useHalfHour) {
                    for (let h = 5; h < 24; h++) {
                        slots.push(`${h.toString().padStart(2,'0')}:00 - ${h.toString().padStart(2,'0')}:30`);
                        if (h < 23) slots.push(`${h.toString().padStart(2,'0')}:30 - ${(h+1).toString().padStart(2,'0')}:00`);
                        else slots.push(`23:30 - 24:00`);
                    }
                } else {
                    for (let h = 5; h < 24; h++) slots.push(`${h.toString().padStart(2,'0')}:00 - ${(h+1).toString().padStart(2,'0')}:00`);
                    slots.push(`23:00 - 24:00`);
                }
                return slots;
            }

            function defaultTask(h) {
                if (h >= 5 && h < 8) return '晨间日语';
                if (h >= 8 && h < 12) return '工作/教学';
                if (h >= 12 && h < 14) return '午餐休息';
                if (h >= 14 && h < 18) return '下午备课';
                if (h >= 18 && h < 22) return '晚间学习';
                return '放松/睡眠';
            }
            function resetTableData() {
                timeSlots = genTimeSlots();
                tableData = [['时间','周一','周二','周三','周四','周五','周六','周日']];
                for (let t of timeSlots) {
                    let hour = parseInt(t.split(':')[0]);
                    let row = [t];
                    for (let i=0;i<7;i++) row.push(defaultTask(hour));
                    tableData.push(row);
                }
            }
            async function loadLocal() {
                const saved = loadJSON(LS_PREFIX+currentWeekKey, null);
                if (saved) { tableData = saved.table || tableData; localCache = saved.cache || {}; }
                mergedGroups = loadJSON(LS_PREFIX+'merged_'+USER_ID, {});
                if (cloudReady) {
                    try {
                        const { data, error } = await supabase.from('user_settings').select('merged_groups').eq('user_id',USER_ID).maybeSingle();
                        if (!error && data?.merged_groups) { mergedGroups = data.merged_groups; saveJSON(LS_PREFIX+'merged_'+USER_ID, mergedGroups); }
                    } catch(e){}
                }
            }
            function saveLocal() {
                saveJSON(LS_PREFIX+currentWeekKey, { table: tableData, cache: localCache });
                saveJSON(LS_PREFIX+'merged_'+USER_ID, mergedGroups);
            }
            async function loadCloud() {
                if (!cloudReady) return;
                const { data, error } = await supabase.from('plan_data').select('date,cell_key,edited_text,subtasks').eq('user_id',USER_ID).eq('week_key',currentWeekKey);
                if (error) return;
                for (let item of data) {
                    let [row,col] = item.cell_key.split('_').map(Number);
                    let key = `${item.date}_${row}_${col}`;
                    localCache[key] = { text: item.edited_text || tableData[row+1]?.[col] || '', subtasks: item.subtasks || [] };
                    if (item.edited_text && tableData[row+1]) tableData[row+1][col] = item.edited_text;
                }
                saveLocal();
            }
            async function saveCell(date,row,col,text,subtasks) {
                if (!cloudReady) return;
                await supabase.from('plan_data').upsert({
                    user_id:USER_ID, week_key:currentWeekKey, date, cell_key:`${row}_${col}`, edited_text:text, subtasks, updated_at:new Date()
                }, { onConflict:'user_id,date,cell_key' });
            }
            async function loadSettings() {
                let theme='dark', granularity='half';
                if (cloudReady) {
                    const { data, error } = await supabase.from('user_settings').select('theme,granularity').eq('user_id',USER_ID).maybeSingle();
                    if (!error && data) { theme = data.theme || theme; granularity = data.granularity || granularity; }
                }
                theme = loadJSON('selectedTheme', theme);
                granularity = loadJSON(LS_PREFIX+'granularity', granularity);
                handleThemeChange(theme);
                useHalfHour = granularity !== 'hour';
                const granBtn = document.getElementById('granularityBtn');
                if (granBtn) granBtn.textContent = useHalfHour ? '⏱️ 半小时' : '⏱️ 每小时';
                saveJSON('selectedTheme', theme);
                saveJSON(LS_PREFIX+'granularity', granularity);
            }
            async function saveThemeSetting(theme) {
                saveJSON('selectedTheme', theme);
                saveJSON(LS_PREFIX+'granularity', useHalfHour?'half':'hour');
                if (cloudReady) await supabase.from('user_settings').upsert({ user_id:USER_ID, theme, granularity:useHalfHour?'half':'hour', updated_at:new Date() }, { onConflict:'user_id' });
            }
            function saveReminderState() { saveJSON('reminderEnabled', reminderEnabled); }
            function loadReminderState() {
                if (loadJSON('reminderEnabled', false)) {
                    if (Notification.permission === 'granted') startReminder(false);
                    else if (Notification.permission === 'default') Notification.requestPermission().then(p => {
                        if (p === 'granted') startReminder(false);
                        else { reminderEnabled = false; saveReminderState(); }
                    });
                    else { reminderEnabled = false; saveReminderState(); }
                }
            }
            function startReminder(updateUI=true) {
                reminderEnabled = true;
                if (updateUI) {
                    const btn = document.getElementById('reminderToggleBtn');
                    if (btn) { btn.textContent = '🔔 提醒:开'; btn.classList.add('reminder-on'); btn.classList.remove('reminder-off'); }
                    const sbtn = document.getElementById('settingsReminderBtn');
                    if (sbtn) { sbtn.textContent = '🔔 已开启'; sbtn.classList.add('reminder-on'); sbtn.classList.remove('reminder-off'); }
                }
                lastRemindedSlot = null;
                checkReminders();
                if (reminderInterval) clearInterval(reminderInterval);
                reminderInterval = setInterval(checkReminders, 60000);
                saveReminderState();
            }
            function stopReminder() {
                reminderEnabled = false;
                const btn = document.getElementById('reminderToggleBtn');
                if (btn) { btn.textContent = '🔕 提醒:关'; btn.classList.add('reminder-off'); btn.classList.remove('reminder-on'); }
                const sbtn = document.getElementById('settingsReminderBtn');
                if (sbtn) { sbtn.textContent = '🔕 已关闭'; sbtn.classList.add('reminder-off'); sbtn.classList.remove('reminder-on'); }
                if (reminderInterval) clearInterval(reminderInterval);
                saveReminderState();
            }
            function toggleReminder() {
                if (!reminderEnabled) {
                    if (Notification.permission === 'default') Notification.requestPermission().then(p => {
                        if (p === 'granted') startReminder(true);
                        else alert('需要通知权限才能使用提醒功能');
                    });
                    else if (Notification.permission === 'granted') startReminder(true);
                    else alert('通知权限已拒绝，请在浏览器设置中允许通知');
                } else stopReminder();
            }
            function getCurrentSlot() {
                let now = new Date();
                let curMin = now.getHours()*60 + now.getMinutes();
                let col = now.getDay() === 0 ? 7 : now.getDay();
                for (let i=0; i<timeSlots.length; i++) {
                    let parts = timeSlots[i].split(/[-–—]/);
                    if (parts.length < 2) continue;
                    let start = parts[0].trim().split(':');
                    let end = parts[1].trim().split(':');
                    if (start.length<2 || end.length<2) continue;
                    let sMin = parseInt(start[0])*60+parseInt(start[1]), eMin = parseInt(end[0])*60+parseInt(end[1]);
                    if (!isNaN(sMin) && !isNaN(eMin) && curMin >= sMin && curMin < eMin) return { row:i, col };
                }
                return null;
            }
            function highlightNow() {
                document.querySelectorAll('#mainTable td.now-highlight').forEach(td => td.classList.remove('now-highlight'));
                let slot = getCurrentSlot();
                const banner = document.getElementById('currentTaskBanner'), miniSub = document.getElementById('currentSubtasksMini');
                if (!slot) {
                    if (banner) banner.textContent = '✨ 暂无当前计划';
                    if (miniSub) miniSub.innerHTML = '<span style="opacity:0.5;">暂无可显示的子任务</span>';
                    return;
                }
                let { row, col } = slot, date = currentDates[col-1];
                if (!date) {
                    if (banner) banner.textContent = '✨ 暂无计划';
                    if (miniSub) miniSub.innerHTML = '<span style="opacity:0.5;">暂无可显示的子任务</span>';
                    return;
                }
                let cellKey = `${date}_${row}_${col}`, gid = null;
                for (let [g,group] of Object.entries(mergedGroups)) if (group.cells.includes(cellKey)) { gid = g; break; }
                let taskText = '', allSubtasks = [];
                if (gid) {
                    let group = mergedGroups[gid];
                    let [mdate,mrc] = group.masterKey.split(/_(.+)/);
                    let [mr,mc] = mrc.split('_').map(Number);
                    taskText = tableData[mr+1]?.[mc] || '';
                    let masterCell = document.querySelector(`td[data-merge-gid="${gid}"]`);
                    if (masterCell) masterCell.classList.add('now-highlight');
                    for (let ck of group.cells) {
                        let data = localCache[ck];
                        if (data?.subtasks) allSubtasks = allSubtasks.concat(data.subtasks);
                    }
                } else {
                    taskText = tableData[row+1]?.[col] || '';
                    let cell = document.querySelector(`td[data-cellkey="${cellKey}"]`);
                    if (cell) cell.classList.add('now-highlight');
                    let data = localCache[cellKey];
                    if (data?.subtasks) allSubtasks = data.subtasks;
                }
                if (banner) banner.textContent = '✨ ' + (taskText || '暂无计划');
                if (miniSub) {
                    let unique = [], seen = new Set();
                    for (let s of allSubtasks) {
                        if (!seen.has(s.text)) { seen.add(s.text); unique.push(s); }
                    }
                    miniSub.innerHTML = unique.length ? unique.map(s => `<span class="mini-sub${s.done?' done':''}">${s.done?'✅':'⬜'} ${escapeHtml(s.text)}</span>`).join('') : '<span style="opacity:0.5;">当前时间段暂无子任务</span>';
                }
            }
            function checkReminders() {
                if (!reminderEnabled) return;
                let slot = getCurrentSlot();
                if (!slot) return;
                let { row, col } = slot;
                let date = currentDates[col-1];
                if (!date) return;
                let cellKey = `${date}_${row}_${col}`;
                let slotId = `${currentWeekKey}_${row}_${col}`;
                if (lastRemindedSlot === slotId) return;
                let taskText = '';
                let gid = null;
                for (let [g,group] of Object.entries(mergedGroups)) if (group.cells.includes(cellKey)) { gid = g; break; }
                if (gid) {
                    let group = mergedGroups[gid];
                    let [mdate,mrc] = group.masterKey.split(/_(.+)/);
                    let [mr,mc] = mrc.split('_').map(Number);
                    taskText = tableData[mr+1]?.[mc] || '';
                } else {
                    taskText = tableData[row+1]?.[col] || '';
                }
                let data = localCache[cellKey];
                let hasUnfinished = data?.subtasks?.some(s => !s.done);
                if (Notification.permission === 'granted') {
                    try {
                        new Notification(hasUnfinished ? '⏰ 待办提醒' : '⏰ 计划提醒', {
                            body: `${timeSlots[row]} — ${taskText}`,
                            icon: 'icon-512.png',
                            silent: false
                        });
                    } catch(e) {}
                    playBeep();
                }
                lastRemindedSlot = slotId;
                highlightNow();
            }
            function playBeep() {
                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const now = audioCtx.currentTime;
                    const notes = [{ freq:523.25, time:0 },{ freq:659.25, time:0.2 },{ freq:783.99, time:0.4 },{ freq:1046.5, time:0.7 }];
                    notes.forEach(n => {
                        let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                        osc.type = 'sine'; osc.frequency.value = n.freq;
                        gain.gain.setValueAtTime(0.4, now+n.time);
                        gain.gain.exponentialRampToValueAtTime(0.01, now+n.time+0.5);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now+n.time); osc.stop(now+n.time+0.5);
                    });
                } catch(e) {}
            }
            function renderTable() {
                if (!tableData || tableData.length === 0) resetTableData();
                const thead = document.getElementById('tableHead'), tbody = document.getElementById('tableBody');
                if (!thead || !tbody) return;
                thead.innerHTML = '';
                tbody.innerHTML = '';
                let trH = document.createElement('tr');
                tableData[0].forEach(h => { let th = document.createElement('th'); th.textContent = h; trH.appendChild(th); });
                thead.appendChild(trH);
                let mergeMap = {}; for (let [gid,group] of Object.entries(mergedGroups)) for (let ck of group.cells) mergeMap[ck] = gid;
                let skipCells = new Set();
                for (let r=1; r<tableData.length; r++) {
                    let tr = document.createElement('tr');
                    for (let c=0; c<tableData[r].length; c++) {
                        if (skipCells.has(`${r}_${c}`)) continue;
                        let cellKey = c===0 ? null : `${currentDates[c-1]}_${r-1}_${c}`;
                        let gid = cellKey ? mergeMap[cellKey] : null,
                            group = gid ? mergedGroups[gid] : null,
                            isMaster = group && group.masterKey === cellKey;
                        let cell = c===0 ? document.createElement('th') : document.createElement('td');
                        let text = tableData[r][c] || '';
                        cell.setAttribute('data-row', r-1);
                        cell.setAttribute('data-col', c);
                        if (c>0) { cell.setAttribute('data-date', currentDates[c-1]); cell.setAttribute('data-cellkey', cellKey); }
                        if (isMaster) {
                            cell.setAttribute('rowspan', group.rowspan);
                            cell.setAttribute('colspan', group.colspan);
                            cell.setAttribute('data-merge-gid', gid);
                            cell.classList.add('merge-master');
                            for (let dr=0; dr<group.rowspan; dr++) for (let dc=0; dc<group.colspan; dc++) if (dr!==0 || dc!==0) skipCells.add(`${r+dr}_${c+dc}`);
                        }
                        let subtaskInfo = '';
                        if (cellKey && localCache[cellKey]?.subtasks?.length > 0) {
                            let subs = localCache[cellKey].subtasks;
                            let done = subs.filter(s => s.done).length;
                            subtaskInfo = `<span class="subtask-count">${done}/${subs.length}</span>`;
                        }
                        cell.innerHTML = `<div class="cell-content"><span>${escapeHtml(text)}</span>${subtaskInfo}</div>`;
                        tr.appendChild(cell);
                    }
                    tbody.appendChild(tr);
                }
                attachCellEvents();
                highlightNow();
            }
            function attachCellEvents() {
                document.querySelectorAll('#mainTable td').forEach(cell => { cell.onclick = (e) => handleCellClick(cell,e); });
            }
            function handleCellClick(cell, e) {
                if (mergeMode) { toggleMergeSelection(cell); return; }
                let row = parseInt(cell.dataset.row), col = parseInt(cell.dataset.col);
                if (col===0 || isNaN(row)) return;
                openSubtaskModal(cell.dataset.date, row, col, cell.dataset.cellkey);
            }
            function toggleMergeSelection(cell) {
                let ck = cell.dataset.cellkey; if (!ck) return;
                let idx = mergeSelection.indexOf(ck);
                if (idx >= 0) { mergeSelection.splice(idx,1); cell.classList.remove('selected-cell'); }
                else { mergeSelection.push(ck); cell.classList.add('selected-cell'); }
                document.getElementById('applyMergeBtn').disabled = mergeSelection.length < 2;
                document.getElementById('mergeHint').textContent = mergeSelection.length ? `已选${mergeSelection.length}个` : '';
            }
            function applyMerge() {
                if (mergeSelection.length < 2) return;
                let cells = mergeSelection.map(ck => {
                    let [date,rc] = ck.split(/_(.+)/); let [r,c] = rc.split('_').map(Number);
                    return { date, row:r, col:c, key:ck };
                });
                let minRow = Math.min(...cells.map(c=>c.row)), minCol = Math.min(...cells.map(c=>c.col)),
                    maxRow = Math.max(...cells.map(c=>c.row)), maxCol = Math.max(...cells.map(c=>c.col));
                let master = cells.find(c=>c.row===minRow && c.col===minCol);
                mergedGroups[Date.now().toString()] = { masterKey: master.key, cells: cells.map(c=>c.key), rowspan: maxRow-minRow+1, colspan: maxCol-minCol+1 };
                saveJSON(LS_PREFIX+'merged_'+USER_ID, mergedGroups);
                if (cloudReady) supabase.from('user_settings').upsert({ user_id:USER_ID, merged_groups:mergedGroups, updated_at:new Date() }, { onConflict:'user_id' }).then(()=>{});
                exitMergeMode(); renderTable();
            }
            function exitMergeMode() {
                mergeMode = false; mergeSelection = [];
                document.querySelectorAll('.selected-cell').forEach(c=>c.classList.remove('selected-cell'));
                document.getElementById('mergeModeBtn').textContent = '🔲 合并模式';
                document.getElementById('applyMergeBtn').disabled = true;
                document.getElementById('cancelMergeBtn').disabled = true;
                document.getElementById('mergeHint').textContent = '';
            }
            function openSubtaskModal(date, row, col, cellKey) {

derAll();}}); document.getElementById('cancelRepayBtn').addEventListener('click',()=>document.getElementById('repayModal').style.display='none'); document.querySelectorAll('#debtFilterBar button').forEach(btn=>{btn.addEventListener('click',function(){dType=this.dataset.debtfilter;document.querySelectorAll('#debtFilterBar button').forEach(b=>b.classList.remove('active'));this.classList.add('active');renderDebt();});}); document.getElementById('refreshCloudBtn').addEventListener('click',refreshFromCloud); renderAll(); }

            function renderWallpaperUI(container){ container.innerHTML=`<div class="setting-item"><span>选择壁纸</span></div><div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px;"><div class="wallpaper-none${currentWallpaperIndex===null?' selected':''}" id="wpNone">无</div>${wallpapers.map((wp,idx)=>`<img class="wallpaper-thumb${currentWallpaperIndex===idx?' selected':''}" src="${wp.url}" data-idx="${idx}">`).join('')}<button class="btn btn-xs" id="addWallpaperBtn" style="height:80px;width:80px;">➕<br>添加</button></div><div class="setting-item"><span>管理壁纸</span><button class="btn btn-sm btn-danger" id="deleteWallpaperBtn" ${currentWallpaperIndex===null?'disabled':''}>🗑 删除当前壁纸</button></div><input type="file" id="wallpaperFileInput" accept="image/*" style="display:none;">`;
