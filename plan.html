<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>强韧计划 · 主题类别版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, monospace;
            min-height: 100vh;
            padding: 16px;
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            position: relative;
            /* 默认由JS设置变量 */
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-animation);
            pointer-events: none;
            z-index: 0;
            animation: bgMove 20s infinite alternate ease-in-out;
        }
        @keyframes bgMove {
            0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            100% { transform: scale(1.05) rotate(1deg); opacity: 1; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-container);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 30px var(--border-glow), inset 0 0 5px rgba(255,255,255,0.05);
            padding: 1.5rem;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
        h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--text-secondary), var(--text-primary));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 0 10px var(--text-secondary); letter-spacing: 1px;
        }
        
        button, .theme-btn {
            background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-primary);
            padding: 8px 14px; border-radius: 40px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
            backdrop-filter: blur(10px); transition: all 0.25s; box-shadow: 0 0 8px var(--btn-border);
            letter-spacing: 0.5px; margin: 2px;
        }
        button:hover, .theme-btn:hover {
            transform: translateY(-2px); box-shadow: 0 0 18px var(--btn-border), 0 5px 15px rgba(0,0,0,0.2);
        }
        button:active { transform: scale(0.95); }
        
        .info-bar {
            background: var(--card-bg); backdrop-filter: blur(15px); border-radius: 60px;
            padding: 14px 24px; margin: 16px 0; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 12px; border: 1px solid var(--border-glow);
            box-shadow: 0 0 15px var(--border-glow), inset 0 0 5px rgba(255,255,255,0.05);
        }
        #weekDisplay { color: var(--text-secondary); font-size: 0.95rem; font-weight: 600; }
        #nowTaskDisplay {
            background: var(--btn-bg); padding: 10px 24px; border-radius: 60px; color: var(--text-primary);
            font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; box-shadow: 0 0 20px var(--border-glow);
            border-left: 4px solid var(--text-secondary); animation: pulseText 2s infinite;
        }
        @keyframes pulseText {
            0% { text-shadow: 0 0 4px var(--text-secondary); opacity: 0.9; }
            50% { text-shadow: 0 0 18px var(--text-secondary); opacity: 1; }
            100% { text-shadow: 0 0 4px var(--text-secondary); opacity: 0.9; }
        }
        
        .stats-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 16px; }
        .progress-card {
            background: var(--card-bg); border-radius: 2rem; padding: 16px 20px; flex: 1;
            display: flex; align-items: center; gap: 20px; backdrop-filter: blur(10px);
            border: 1px solid var(--border-glow); box-shadow: 0 0 15px var(--border-glow);
        }
        .circular-progress { width: 80px; height: 80px; position: relative; flex-shrink: 0; }
        .circular-progress svg { filter: drop-shadow(0 0 6px var(--progress-fill)); }
        .circular-progress circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .progress-bg { stroke: var(--progress-bg); }
        .progress-fill {
            stroke: var(--progress-fill); stroke-dasharray: 0, 314;
            transition: stroke-dasharray 0.6s; filter: drop-shadow(0 0 8px var(--progress-fill));
        }
        .progress-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.3rem; font-weight: 700; color: var(--text-primary);
            text-shadow: 0 0 8px var(--progress-fill);
        }
        .chart-container { flex: 2; height: 80px; display: flex; align-items: flex-end; gap: 8px; padding: 4px 0; }
        .bar {
            flex: 1; background: var(--progress-bg); border-radius: 8px 8px 0 0; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end; box-shadow: inset 0 0 4px rgba(0,0,0,0.3);
        }
        .bar-fill {
            background: var(--progress-fill); width: 100%; transition: height 0.5s;
            border-radius: 4px 4px 0 0; box-shadow: 0 0 10px var(--progress-fill);
        }
        
        .table-wrapper {
            overflow-x: auto; border-radius: 1.2rem; margin-top: 16px;
            box-shadow: 0 0 15px var(--border-glow);
            scrollbar-width: thin; scrollbar-color: var(--progress-fill) var(--progress-bg);
        }
        .table-wrapper::-webkit-scrollbar { height: 8px; }
        .table-wrapper::-webkit-scrollbar-track { background: var(--progress-bg); border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--progress-fill); border-radius: 4px; box-shadow: 0 0 6px var(--progress-fill);
        }
        
        table {
            width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px;
            min-width: 750px; background: var(--table-bg); border-radius: 1rem; table-layout: fixed;
        }
        th:first-child, td:first-child { width: 90px; min-width: 90px; max-width: 90px; }
        th, td {
            border: 0.5px solid var(--border-glow); padding: 10px 6px; vertical-align: middle;
            background: var(--td-bg); color: var(--text-primary); transition: 0.2s;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        th {
            background: var(--th-bg); color: var(--text-secondary); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.8rem;
        }
        tr:hover td { background: rgba(255,255,255,0.08); box-shadow: inset 0 0 8px var(--border-glow); }
        .cell-content { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
        .completed { text-decoration: line-through; opacity: 0.65; }
        .status-icon { font-size: 1.1rem; margin-left: 4px; filter: drop-shadow(0 0 4px currentColor); }
        .subtask-icon { font-size: 0.9rem; margin-left: 4px; cursor: pointer; opacity: 0.8; transition: 0.2s; }
        .subtask-icon:hover { opacity: 1; transform: scale(1.2); text-shadow: 0 0 8px var(--text-secondary); }
        
        td.now-highlight {
            background: var(--highlight-bg) !important; color: #fff !important; font-weight: bold;
            text-shadow: 0 0 6px #000; box-shadow: var(--highlight-shadow); border-radius: 12px;
            transform: scale(1.03); z-index: 5; animation: glowPulse 1.5s infinite;
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 2px #fff, 0 0 15px var(--text-secondary); }
            50% { box-shadow: 0 0 0 2px #fff, 0 0 30px var(--text-secondary); }
            100% { box-shadow: 0 0 0 2px #fff, 0 0 15px var(--text-secondary); }
        }
        
        .scroll-buttons { display: flex; justify-content: center; gap: 24px; margin-top: 20px; }
        .footer { font-size: 11px; text-align: center; margin-top: 20px; color: var(--text-secondary); opacity: 0.8; }
        
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 1000; padding: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-card {
            background: var(--stat-bg); border-radius: 2.5rem; max-width: 700px; margin: 20px auto;
            padding: 24px; border: 1px solid var(--border-glow); box-shadow: 0 0 40px var(--border-glow);
            color: var(--text-primary);
        }
        .stat-item {
            background: var(--card-bg); margin: 8px 0; padding: 14px; border-radius: 20px; cursor: pointer;
            transition: 0.2s; border: 1px solid transparent;
        }
        .stat-item:hover { background: var(--btn-bg); border-color: var(--border-glow); box-shadow: 0 0 12px var(--border-glow); }
        input, select {
            background: var(--card-bg); border: 1px solid var(--border-glow); border-radius: 40px;
            padding: 12px; color: var(--text-primary); width: 100%; margin: 8px 0; outline: none;
            font-size: 0.9rem;
        }
        input:focus, select:focus { box-shadow: 0 0 12px var(--border-glow); }
        .theme-category { margin: 16px 0; }
        .theme-category h4 { margin-bottom: 8px; color: var(--text-secondary); }
        .theme-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .theme-option {
            background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-primary);
            padding: 10px 16px; border-radius: 30px; cursor: pointer; transition: 0.2s;
            font-size: 0.85rem; font-weight: 500; box-shadow: 0 0 5px var(--btn-border);
        }
        .theme-option:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--btn-border); }
        .theme-option.active { background: var(--progress-fill); border-color: #fff; color: #fff; font-weight: 700; }
        .status-message { background: var(--card-bg); color: var(--text-secondary); padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; font-weight: 600; margin-left: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ 强韧计划</h1>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
            <button id="themeBtn">🎨 主题</button>
            <button id="newWeekBtn">📅 新周</button>
            <button id="historyBtn">📊 历史</button>
            <button id="exportBtn">📎 导出</button>
            <button id="importBtn">📁 导入</button>
            <div style="display: flex; align-items: center; gap: 6px; margin-left: 8px;">
                <label style="font-size:0.85rem;">🔔</label>
                <input type="checkbox" id="notifyToggle">
            </div>
            <span id="statusMsg" class="status-message"></span>
        </div>
    </div>

    <div class="stats-row">
        <div class="progress-card">
            <div class="circular-progress">
                <svg width="80" height="80" viewBox="0 0 100 100">
                    <circle class="progress-bg" cx="50" cy="50" r="45" stroke-width="8"></circle>
                    <circle class="progress-fill" cx="50" cy="50" r="45" stroke-width="8" stroke-dasharray="0, 314"></circle>
                </svg>
                <div class="progress-text" id="progressPercent">0%</div>
            </div>
            <div style="font-size:0.9rem; font-weight:600;">本周完成率</div>
        </div>
        <div class="progress-card">
            <div class="chart-container" id="dailyChart"></div>
        </div>
    </div>

    <div class="info-bar">
        <span id="weekDisplay">--</span>
        <span id="nowTaskDisplay">✨ 当前任务</span>
    </div>
    <div class="table-wrapper" id="tableWrapper">
        <table id="mainTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="scroll-buttons">
        <button id="scrollLeft">◀ 左滑</button>
        <button id="scrollRight">右滑 ▶</button>
    </div>
    <div class="footer">单击编辑 · 长按标记 · 点击📋管理子任务 · 数据云端同步</div>
</div>

<!-- 历史模态框 -->
<div id="historyModal" class="modal">
    <div class="modal-card">
        <div style="display: flex; justify-content: space-between;">
            <h3>📜 历史记录</h3>
            <button id="closeHistory" style="background:none; border:none; font-size:28px; color:var(--text-primary);">✖</button>
        </div>
        <h4>按周查看</h4>
        <select id="weekSelect"></select>
        <div id="weeklyStats"></div>
        <h4>按任务搜索</h4>
        <input type="text" id="taskSearch" placeholder="输入任务关键词">
        <div id="taskStats"></div>
    </div>
</div>

<!-- 主题选择模态框 -->
<div id="themeModal" class="modal">
    <div class="modal-card">
        <div style="display: flex; justify-content: space-between;">
            <h3>🎨 选择主题</h3>
            <button id="closeTheme" style="background:none; border:none; font-size:28px; color:var(--text-primary);">✖</button>
        </div>
        <div id="themeCategories"></div>
    </div>
</div>

        // 当前激活的主题ID
        let currentThemeId = localStorage.getItem('selectedThemeId') || 'dark-default';

        function applyTheme(themeId) {
            const allThemes = themeCategories.flatMap(cat => cat.themes);
            const theme = allThemes.find(t => t.id === themeId);
            if (!theme) return;
            const root = document.documentElement;
            Object.entries(theme.vars).forEach(([prop, value]) => {
                root.style.setProperty(prop, value);
            });
            currentThemeId = themeId;
            localStorage.setItem('selectedThemeId', themeId);
            // 更新主题弹窗里的active样式
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.getAttribute('data-id') === themeId);
            });
        }

        function renderThemeModal() {
            const container = document.getElementById('themeCategories');
            container.innerHTML = '';
            themeCategories.forEach(cat => {
                const catDiv = document.createElement('div');
                catDiv.className = 'theme-category';
                catDiv.innerHTML = `<h4>${cat.name}</h4><div class="theme-list"></div>`;
                const listDiv = catDiv.querySelector('.theme-list');
                cat.themes.forEach(theme => {
                    const btn = document.createElement('button');
                    btn.className = 'theme-option';
                    btn.textContent = theme.name;
                    btn.setAttribute('data-id', theme.id);
                    if (theme.id === currentThemeId) btn.classList.add('active');
                    btn.onclick = () => {
                        applyTheme(theme.id);
                        document.getElementById('themeModal').style.display = 'none';
                    };
                    listDiv.appendChild(btn);
                });
                container.appendChild(catDiv);
            });
        }

        // 初始化主题系统
        applyTheme(currentThemeId);

        // ---------- 以下原有代码，保持全部功能 ----------
        let timeSlots = [];
        const headers = ["时间", "周一", "周二", "周三", "周四", "周五", "周六", "周日"];
        let tableData = [];
        let statusCache = {};
        let currentWeekKey = "";
        let currentDates = [];
        let notifEnabled = false;
        let lastNotifiedSlot = "";
        let hasSubtasksColumn = false;

        function setStatus(msg) { document.getElementById('statusMsg').textContent = msg || ''; }

        function generateTimeSlots() {
            const slots = [];
            for (let h = 5; h < 24; h++) {
                slots.push(`${h.toString().padStart(2,'0')}:00 – ${h.toString().padStart(2,'0')}:30`);
                if (h < 23) slots.push(`${h.toString().padStart(2,'0')}:30 – ${(h+1).toString().padStart(2,'0')}:00`);
                else slots.push(`23:30 – 24:00`);
            }
            return slots;
        }
        function defaultTask(hour) {
            if (hour >=5 && hour<8) return "晨间准备 / 日语";
            if (hour>=8 && hour<12) return "工作 / 教学";
            if (hour>=12 && hour<14) return "午餐 + 午休";
            if (hour>=14 && hour<18) return "下午工作 / 备课";
            if (hour>=18 && hour<22) return "晚间学习 / 副业筹备";
            return "休息 / 准备睡眠";
        }
        function initTableData() {
            timeSlots = generateTimeSlots();
            tableData = [headers.slice()];
            for (const t of timeSlots) {
                const hour = parseInt(t.split(':')[0]);
                const row = [t];
                for (let i=0;i<7;i++) row.push(defaultTask(hour));
                tableData.push(row);
            }
        }
        initTableData();

        function getWeekKey(date) {
            const d = new Date(date);
            d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
            const year = d.getFullYear();
            const week = Math.floor(( (d - new Date(year,0,4)) / 86400000 + (new Date(year,0,4).getDay() + 6) % 7 ) / 7);
            return `${year}-W${week.toString().padStart(2,'0')}`;
        }
        function getWeekDates(weekKey) {
            const [year, wk] = weekKey.split('-W');
            const jan4 = new Date(parseInt(year), 0, 4);
            const jan4Day = jan4.getDay();
            const mondayOffset = (jan4Day === 0 ? -6 : 1 - jan4Day);
            const firstMonday = new Date(jan4);
            firstMonday.setDate(jan4.getDate() + mondayOffset + (parseInt(wk)-1)*7);
            const dates = [];
            for (let i=0;i<7;i++) {
                const d = new Date(firstMonday);
                d.setDate(firstMonday.getDate() + i);
                dates.push(d.toISOString().slice(0,10));
            }
            return dates;
        }
        function updateWeekInfo() {
            const now = new Date();
            currentWeekKey = getWeekKey(now);
            currentDates = getWeekDates(currentWeekKey);
            const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
            document.getElementById('weekDisplay').innerHTML = `${currentWeekKey}  ${weekdays[now.getDay()]} ${now.toLocaleTimeString()}`;
        }

        async function checkSubtasksColumn() {
            try {
                const { error } = await supabase
                    .from('plan_data')
                    .select('subtasks')
                    .limit(1);
                if (error && error.message && error.message.includes('column "subtasks" does not exist')) {
                    hasSubtasksColumn = false;
                } else if (!error) {
                    hasSubtasksColumn = true;
                } else {
                    hasSubtasksColumn = false;
                }
            } catch (e) {
                hasSubtasksColumn = false;
            }
        }

        async function loadCloudData() {
            try {
                let query = supabase
                    .from('plan_data')
                    .select('date, cell_key, status, edited_text' + (hasSubtasksColumn ? ', subtasks' : ''))
                    .eq('user_id', MY_USER_ID)
                    .eq('week_key', currentWeekKey);
                const { data, error } = await query;
                if (error) throw error;
                statusCache = {};
                for (const item of data) {
                    const key = `${item.date}_${item.cell_key}`;
                    statusCache[key] = {
                        status: item.status,
                        edited_text: item.edited_text,
                        subtasks: (hasSubtasksColumn && item.subtasks) ? item.subtasks : []
                    };
                    if (item.edited_text) {
                        const [row, col] = item.cell_key.split('_').map(Number);
                        if (tableData[row+1] && tableData[row+1][col]) tableData[row+1][col] = item.edited_text;
                    }
                }
                renderTable();
                updateProgress();
                setStatus('');
            } catch (err) {
                console.error(err);
                setStatus('⚠️ 加载失败，请刷新');
            }
        }

        async function saveToCloud(row, col, date, status, editedText, subtasks = null) {
            const cellKey = `${row}_${col}`;
            const existing = statusCache[`${date}_${cellKey}`] || {};
            const upsertData = {
                user_id: MY_USER_ID,
                week_key: currentWeekKey,
                date: date,
                cell_key: cellKey,
                status: (status !== undefined) ? status : existing.status,
                edited_text: (editedText !== undefined) ? editedText : existing.edited_text,
                updated_at: new Date()
            };
            if (hasSubtasksColumn && subtasks !== null) upsertData.subtasks = subtasks;
            try {
                const { error } = await supabase
                    .from('plan_data')
                    .upsert(upsertData, { onConflict: 'user_id, date, cell_key' });
                if (error) throw error;
                statusCache[`${date}_${cellKey}`] = {
                    status: upsertData.status,
                    edited_text: upsertData.edited_text,
                    subtasks: upsertData.subtasks || []
                };
            } catch (err) {
                console.error(err);
                setStatus('⚠️ 保存失败');
            }
        }

        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            thead.innerHTML = '';
            tbody.innerHTML = '';
            const trHead = document.createElement('tr');
            headers.forEach(h => {
                const th = document.createElement('th');
                th.textContent = h;
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);
            for (let r=1; r<tableData.length; r++) {
                const tr = document.createElement('tr');
                for (let c=0; c<tableData[r].length; c++) {
                    const cell = (c===0) ? document.createElement('th') : document.createElement('td');
                    const text = tableData[r][c] || '';
                    cell.setAttribute('data-row', r-1);
                    cell.setAttribute('data-col', c);
                    if (c !== 0) cell.title = text;
                    const date = currentDates[c-1];
                    let status = null, subtasks = [];
                    if (date) {
                        const key = `${date}_${r-1}_${c}`;
                        if (statusCache[key]) {
                            status = statusCache[key].status;
                            subtasks = statusCache[key].subtasks || [];
                        }
                    }
                    let subtaskHtml = '';
                    if (subtasks.length > 0) {
                        const doneCount = subtasks.filter(s => s.done).length;
                        subtaskHtml = `<span class="subtask-icon" data-row="${r-1}" data-col="${c}">📋 ${doneCount}/${subtasks.length}</span>`;
                    }
                    let statusIcon = '';
                    let textClass = '';
                    if (status === true) { statusIcon = '✅'; textClass = 'completed'; }
                    else if (status === false) statusIcon = '❌';
                    cell.innerHTML = `<div class="cell-content"><span class="${textClass}">${escapeHtml(text)}</span>${statusIcon}${subtaskHtml}</div>`;
                    cell.setAttribute('data-original-text', text);
                    tr.appendChild(cell);
                }
                tbody.appendChild(tr);
            }
            attachEvents();
            highlightNow();
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

        function highlightNow() {
            document.querySelectorAll('#mainTable td').forEach(td => td.classList.remove('now-highlight'));
            const now = new Date();
            const targetCol = now.getDay() === 0 ? 7 : now.getDay();
            const curTotal = now.getHours()*60 + now.getMinutes();
            const rows = document.getElementById('tableBody')?.children;
            if (!rows) return;
            let targetRow = null;
            for (let i=0; i<rows.length; i++) {
                const timeCell = rows[i].cells[0];
                const match = timeCell.textContent.match(/(\d{1,2}):(\d{2})\s*[-–—]\s*(\d{1,2}):(\d{2})/);
                if (match) {
                    const start = parseInt(match[1])*60 + parseInt(match[2]);
                    const end = parseInt(match[3])*60 + parseInt(match[4]);
                    if (curTotal >= start && curTotal < end) { targetRow = rows[i]; break; }
                }
            }
            if (targetRow && targetRow.cells[targetCol]) {
                targetRow.cells[targetCol].classList.add('now-highlight');
                const task = targetRow.cells[targetCol].getAttribute('data-original-text') || '';
                document.getElementById('nowTaskDisplay').innerHTML = `✨ 现在：${task.slice(0,45)}`;
                const slotKey = targetRow.cells[0].textContent;
                if (notifEnabled && slotKey !== lastNotifiedSlot && 'Notification' in window && Notification.permission === 'granted') {
                    new Notification('⏰ 强韧计划', { body: `现在该做：${task}` });
                    lastNotifiedSlot = slotKey;
                }
            } else {
                document.getElementById('nowTaskDisplay').innerHTML = `💤 当前无任务时段`;
            }
        }
        function checkAndNotify() {
            if (notifEnabled && 'Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        function updateProgress() {
            let total = 0, completed = 0;
            for (let r=0; r<timeSlots.length; r++) {
                for (let c=1; c<=7; c++) {
                    total++;
                    const date = currentDates[c-1];
                    if (date) {
                        const key = `${date}_${r}_${c}`;
                        if (statusCache[key]?.status === true) completed++;
                    }
                }
            }
            const percent = total===0 ? 0 : Math.round(completed/total*100);
            const circumference = 2 * Math.PI * 45;
            const dash = (percent/100) * circumference;
            document.querySelector('.progress-fill').setAttribute('stroke-dasharray', `${dash}, ${circumference}`);
            document.getElementById('progressPercent').innerText = percent+'%';
            const dailyDone = [0,0,0,0,0,0,0];
            for (let i=0;i<7;i++) {
                const date = currentDates[i];
                if (!date) continue;
                for (let r=0; r<timeSlots.length; r++) {
                    const key = `${date}_${r}_${i+1}`;
                    if (statusCache[key]?.status === true) dailyDone[i]++;
                }
            }
            const maxVal = Math.max(...dailyDone,1);
            const chartDiv = document.getElementById('dailyChart');
            chartDiv.innerHTML = '';
            const days = ['一','二','三','四','五','六','日'];
            for (let i=0;i<7;i++) {
                const height = (dailyDone[i]/maxVal)*50;
                const barDiv = document.createElement('div');
                barDiv.className = 'bar';
                barDiv.innerHTML = `<div class="bar-fill" style="height:${height}px;"></div><div style="font-size:9px; text-align:center; font-weight:600;">${days[i]}</div>`;
                chartDiv.appendChild(barDiv);
            }
        }

        let longPressTimer = null;
        function attachEvents() {
            const cells = document.querySelectorAll('#mainTable td');
            cells.forEach(cell => {
                cell.removeEventListener('click', onClick);
                cell.removeEventListener('touchstart', onTouchStart);
                cell.removeEventListener('touchend', onTouchEnd);
                cell.removeEventListener('touchmove', onTouchMove);
                cell.addEventListener('click', onClick);
                cell.addEventListener('touchstart', onTouchStart);
                cell.addEventListener('touchend', onTouchEnd);
                cell.addEventListener('touchmove', onTouchMove);
            });
            document.querySelectorAll('.subtask-icon').forEach(icon => {
                icon.onclick = (e) => {
                    e.stopPropagation();
                    const row = parseInt(icon.getAttribute('data-row'));
                    const col = parseInt(icon.getAttribute('data-col'));
                    showSubtaskManager(row, col);
                };
            });
        }
        async function onClick(e) {
            const cell = e.target.closest('td');
            if (!cell) return;
            const original = cell.getAttribute('data-original-text');
            const newText = prompt('编辑任务内容:', original);
            if (newText !== null && newText !== original) {
                const row = parseInt(cell.getAttribute('data-row'));
                const col = parseInt(cell.getAttribute('data-col'));
                tableData[row+1][col] = newText;
                cell.setAttribute('data-original-text', newText);
                const date = currentDates[col-1];
                if (date) await saveToCloud(row, col, date, undefined, newText);
                renderTable();
                updateProgress();
            }
        }
        function onTouchStart(e) {
            const cell = e.target.closest('td');
            if (!cell) return;
            longPressTimer = setTimeout(() => showMenu(cell), 500);
        }
        function onTouchEnd() { if (longPressTimer) clearTimeout(longPressTimer); }
        function onTouchMove() { if (longPressTimer) clearTimeout(longPressTimer); }
        async function showMenu(cell) {
            const row = parseInt(cell.getAttribute('data-row'));
            const col = parseInt(cell.getAttribute('data-col'));
            const date = currentDates[col-1];
            const key = `${date}_${row}_${col}`;
            const currentStatus = statusCache[key]?.status;
            const opt = prompt(`标记状态:\n1 = ✅ 完成\n2 = ❌ 未完成\n3 = 🔄 清除\n当前: ${currentStatus===true?'完成':currentStatus===false?'未完成':'无'}`);
            let newStatus = null;
            if (opt === '1') newStatus = true;
            else if (opt === '2') newStatus = false;
            else if (opt === '3') newStatus = null;
            else return;
            if (date) await saveToCloud(row, col, date, newStatus);
            renderTable();
            updateProgress();
        }

        function showSubtaskManager(row, col) {
            if (!hasSubtasksColumn) {
                alert('数据库暂不支持子任务。\n请在Supabase执行：\nALTER TABLE plan_data ADD COLUMN IF NOT EXISTS subtasks jsonb;');
                return;
            }
            const date = currentDates[col-1];
            const key = `${date}_${row}_${col}`;
            const subtasks = statusCache[key]?.subtasks || [];
            const newList = prompt('编辑子任务 (用 | 分隔，已完成在前加*，如 买菜|*洗衣服):', subtasks.map(s => (s.done ? '*' : '') + s.text).join('|'));
            if (newList !== null) {
                const parts = newList.split('|').filter(p => p.trim());
                const newSubtasks = parts.map(p => {
                    const done = p.startsWith('*');
                    const text = done ? p.slice(1) : p;
                    return { text: text.trim(), done };
                });
                saveToCloud(row, col, date, undefined, undefined, newSubtasks);
                renderTable();
                updateProgress();
            }
        }

        async function newWeek() {
            if (confirm("开启新的一周？当前数据已保存。")) {
                initTableData();
                updateWeekInfo();
                await loadCloudData();
                renderTable();
                updateProgress();
            }
        }
        function exportToCSV() {
            const rows = [headers.slice()];
            for (let r=1; r<tableData.length; r++) {
                const row = [];
                for (let c=0; c<tableData[r].length; c++) {
                    let text = tableData[r][c];
                    const date = currentDates[c-1];
                    let status = null;
                    if (date && c>0) {
                        const key = `${date}_${r-1}_${c}`;
                        if (statusCache[key]) status = statusCache[key].status;
                    }
                    const mark = status===true ? ' ✅' : (status===false ? ' ❌' : '');
                    row.push(text + mark);
                }
                rows.push(row);
            }
            const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
            const blob = new Blob(["\uFEFF"+csv], {type:'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `plan_${currentWeekKey}.csv`;
            a.click();
            URL.revokeObjectURL(a.href);
        }
        async function importCSV(file) {
            try {
                const text = await file.text();
                const lines = text.split('\n').filter(l => l.trim());
                const rows = lines.map(l => l.split(',').map(c => c.replace(/^"|"$/g, '').replace(/""/g, '"')));
                if (rows.length<2) return;
                for (let r=1; r<Math.min(rows.length, tableData.length); r++) {
                    if (!rows[r] || rows[r].length<2) continue;
                    for (let c=1; c<Math.min(rows[r].length, 8); c++) {
                        const cleanText = rows[r][c].replace(/[✅❌]/g,'').trim();
                        if (cleanText) {
                            tableData[r][c] = cleanText;
                            const date = currentDates[c-1];
                            if (date) await saveToCloud(r-1, c, date, undefined, cleanText);
                        }
                    }
                }
                renderTable();
                updateProgress();
                alert('导入完成');
            } catch (err) { alert('导入失败: '+err.message); }
        }
        async function showHistory() {
            const modal = document.getElementById('historyModal');
            modal.style.display = 'block';
            try {
                const { data: weeksData } = await supabase.from('plan_data').select('week_key').eq('user_id', MY_USER_ID).order('week_key', { ascending: false });
                const weeks = [...new Set(weeksData.map(w => w.week_key))];
                const select = document.getElementById('weekSelect');
                select.innerHTML = '<option value="">-- 选择周 --</option>';
                weeks.forEach(w => { const opt = document.createElement('option'); opt.value = w; opt.textContent = w; select.appendChild(opt); });
                select.onchange = () => { if (select.value) renderWeeklyStats(select.value); };
                document.getElementById('taskSearch').oninput = () => renderTaskStats(document.getElementById('taskSearch').value.trim().toLowerCase());
                if (weeks.length) renderWeeklyStats(weeks[0]);
            } catch (err) { alert('历史加载失败'); }
        }
        async function renderWeeklyStats(weekKey) {
            const { data } = await supabase.from('plan_data').select('date, cell_key, status').eq('user_id', MY_USER_ID).eq('week_key', weekKey);
            const weekDates = getWeekDates(weekKey);
            const container = document.getElementById('weeklyStats');
            container.innerHTML = '';
            for (const date of weekDates) {
                let done=0,total=0;
                for (let r=0; r<timeSlots.length; r++) for (let c=1; c<=7; c++) {
                    total++;
                    const found = data.find(d => d.date===date && d.cell_key===`${r}_${c}`);
                    if (found?.status===true) done++;
                }
                const rate = total===0?0:(done/total*100).toFixed(1);
                const card = document.createElement('div'); card.className='stat-item';
                card.innerHTML = `${date}<br>✅ ${done}/${total} (${rate}%)`;
                card.onclick = () => {
                    const unfinished = [];
                    for (let r=0; r<timeSlots.length; r++) for (let c=1; c<=7; c++) {
                        const found = data.find(d => d.date===date && d.cell_key===`${r}_${c}`);
                        if (!found || found.status!==true) {
                            const text = tableData[r+1]?.[c] || '';
                            if (text) unfinished.push(`${timeSlots[r]} ${text}`);
                        }
                    }
                    alert(unfinished.length===0?`${date} 全部完成！`:`${date} 未完成:\n${unfinished.slice(0,20).join('\n')}`);
                };
                container.appendChild(card);
            }
        }
        async function renderTaskStats(keyword) {
            const { data } = await supabase.from('plan_data').select('date, cell_key, status, week_key').eq('user_id', MY_USER_ID);
            const taskMap = new Map();
            for (const item of data) {
                const [row,col] = item.cell_key.split('_').map(Number);
                const text = tableData[row+1]?.[col] || '';
                if (!text || (keyword && !text.toLowerCase().includes(keyword))) continue;
                if (!taskMap.has(text)) taskMap.set(text, { total:0, done:0, instances:[] });
                const entry = taskMap.get(text);
                entry.total++;
                if (item.status===true) entry.done++;
                entry.instances.push({ week: item.week_key, date: item.date, time: timeSlots[row], task: text });
            }
            const container = document.getElementById('taskStats'); container.innerHTML = '';
            for (const [task, info] of taskMap.entries()) {
                const rate = (info.done/info.total*100).toFixed(1);
                const div = document.createElement('div'); div.className='stat-item';
                div.innerHTML = `${task}<br>✅ ${info.done}/${info.total} (${rate}%)`;
                div.onclick = () => alert(`未完成实例:\n${info.instances.map(i=>`${i.week} ${i.date} ${i.time}`).join('\n')}`);
                container.appendChild(div);
            }
            if (taskMap.size===0) container.innerHTML = '<div>未找到任务</div>';
        }

        // 初始化页面
        window.onload = async () => {
            updateWeekInfo();
            await checkSubtasksColumn();
            await loadCloudData();
            setInterval(() => { highlightNow(); updateWeekInfo(); updateProgress(); }, 60000);

            // 主题弹窗
            document.getElementById('themeBtn').addEventListener('click', () => {
                renderThemeModal();
                document.getElementById('themeModal').style.display = 'block';
            });
            document.getElementById('closeTheme').addEventListener('click', () => {
                document.getElementById('themeModal').style.display = 'none';
            });
            document.getElementById('themeModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('themeModal')) document.getElementById('themeModal').style.display = 'none';
            });

            document.getElementById('newWeekBtn').addEventListener('click', newWeek);
            document.getElementById('historyBtn').addEventListener('click', showHistory);
            document.getElementById('exportBtn').addEventListener('click', exportToCSV);
            document.getElementById('importBtn').addEventListener('click', () => {
                const input = document.createElement('input'); input.type='file'; input.accept='.csv';
                input.onchange = e => { if (e.target.files[0]) importCSV(e.target.files[0]); input.remove(); };
                input.click();
            });
            document.getElementById('closeHistory').addEventListener('click', () => document.getElementById('historyModal').style.display='none');
            document.getElementById('historyModal').addEventListener('click', e => { if (e.target === document.getElementById('historyModal')) document.getElementById('historyModal').style.display='none'; });
            document.getElementById('scrollLeft').addEventListener('click', () => document.getElementById('tableWrapper').scrollLeft -= 200);
            document.getElementById('scrollRight').addEventListener('click', () => document.getElementById('tableWrapper').scrollLeft += 200);

            const notifyToggle = document.getElementById('notifyToggle');
            notifyToggle.checked = localStorage.getItem('notifyEnabled') === 'true';
            notifyToggle.addEventListener('change', () => {
                notifEnabled = notifyToggle.checked;
                localStorage.setItem('notifyEnabled', notifEnabled);
                if (notifEnabled && 'Notification' in window && Notification.permission !== 'granted') Notification.requestPermission();
            });
            notifEnabled = notifyToggle.checked;
            checkAndNotify();
        };
    })();
</script>
